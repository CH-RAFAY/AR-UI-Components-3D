<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificates & Contact | Abdul Rafay Ather</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --dim-text-color: #3a3a3a;
            --heading-glow-color: rgba(14, 165, 233, 0.6);
            --glow-size: 175px;
            --reveal-size: 120px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: radial-gradient(ellipse at center, #0a0a0a 0%, #000000 100%);
            font-family: 'Inter', sans-serif;
            color: #f1f5f9;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .main-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            gap: 4rem;
        }

        /* Enhanced Section Headings with Glow Animation */
        @keyframes glow-scan {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        
        .section-title {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 700;
            color: var(--dim-text-color);
            text-align: center;
            margin-bottom: 2.5rem;
            letter-spacing: -0.02em;
            position: relative;
            user-select: none;
            z-index: 10;
            display: inline-block;
        }

        .section-title:hover::after {
            opacity: 0;
        }

        .section-title::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            background: linear-gradient(
                90deg, 
                var(--dim-text-color), 
                #b0b8c4,
                var(--dim-text-color)
            );
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: glow-scan 10s linear infinite alternate;
            transition: opacity 0.3s ease-out;
        }

        .section-title::before {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            background: radial-gradient(
                circle var(--glow-size) at var(--x, 50%) var(--y, 50%),
                var(--heading-glow-color),
                transparent 65%
            );
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-clip-path: circle(var(--reveal-size) at var(--x, 50%) var(--y, 50%));
            clip-path: circle(var(--reveal-size) at var(--x, 50%) var(--y, 50%));
        }

        /* Keep the existing underline decoration */
        .section-title:after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: clamp(40px, 8vw, 60px);
            height: 3px;
            background: linear-gradient(90deg, #0ea5e9, #7dd3fc);
            border-radius: 2px;
            z-index: 1;
        }

        /* Certificates Section */
        .certificates-section {
            width: 100%;
            max-width: 1000px;
        }

        .certificates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: clamp(1rem, 3vw, 1.8rem);
        }

        .certificate-card {
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.04) 0%,
                rgba(255, 255, 255, 0.015) 50%,
                rgba(255, 255, 255, 0.04) 100%
            );
            backdrop-filter: blur(25px) saturate(180%);
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            box-shadow: 
                0 12px 30px rgba(0, 0, 0, 0.4),
                0 4px 12px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.25),
                inset 0 -1px 0 rgba(255, 255, 255, 0.1);
            border-radius: clamp(12px, 2vw, 16px);
            padding: clamp(1.2rem, 4vw, 2rem);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: clamp(80px, 15vw, 100px);
        }

        .certificate-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(125, 211, 252, 0.08), transparent);
            transition: left 0.6s ease;
        }

        .certificate-card:hover::before {
            left: 100%;
        }

        .certificate-card:hover {
            transform: translateY(-4px);
            border-color: rgba(125, 211, 252, 0.3);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.5),
                0 8px 20px rgba(0, 0, 0, 0.4),
                0 0 15px rgba(125, 211, 252, 0.15);
        }

        .certificate-name {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(0.9rem, 2.5vw, 1.15rem);
            font-weight: 600;
            color: #f1f5f9;
            flex-grow: 1;
            margin-right: clamp(0.8rem, 3vw, 1.5rem);
            line-height: 1.4;
        }

        .verify-button {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #f1f5f9;
            border: 1px solid rgba(125, 211, 252, 0.25);
            padding: clamp(0.5rem, 2vw, 0.7rem) clamp(0.8rem, 3vw, 1.4rem);
            border-radius: clamp(6px, 1.5vw, 8px);
            font-size: clamp(0.75rem, 2vw, 0.9rem);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            min-width: clamp(70px, 15vw, 100px);
            font-family: 'Inter', sans-serif;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            white-space: nowrap;
        }

        .verify-button:hover {
            transform: scale(1.05);
            border-color: rgba(125, 211, 252, 0.4);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
        }

        .verify-button.verified {
            background: linear-gradient(135deg, #0ea5e9, #7dd3fc);
            color: white;
            border-color: rgba(125, 211, 252, 0.6);
        }

        /* Contact Section */
        .contact-section {
            width: 100%;
            max-width: 600px;
        }

        .email-container {
            margin-bottom: clamp(1.5rem, 4vw, 2.5rem);
        }

        .email-field {
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.04) 0%,
                rgba(255, 255, 255, 0.015) 50%,
                rgba(255, 255, 255, 0.04) 100%
            );
            backdrop-filter: blur(25px) saturate(180%);
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            box-shadow: 
                0 8px 25px rgba(0, 0, 0, 0.3),
                0 3px 10px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.25),
                inset 0 -1px 0 rgba(255, 255, 255, 0.1);
            border-radius: clamp(8px, 2vw, 12px);
            padding: clamp(1rem, 3vw, 1.2rem) clamp(1.2rem, 3vw, 1.5rem);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: clamp(50px, 10vw, 60px);
        }

        .email-field::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(125, 211, 252, 0.08), transparent);
            transition: left 0.6s ease;
        }

        .email-field:hover::before {
            left: 100%;
        }

        .email-field:hover {
            transform: translateY(-2px);
            border-color: rgba(125, 211, 252, 0.3);
            box-shadow: 
                0 12px 30px rgba(0, 0, 0, 0.4),
                0 4px 15px rgba(0, 0, 0, 0.3),
                0 0 10px rgba(125, 211, 252, 0.1);
        }

        .email-text {
            font-family: 'Inter', sans-serif;
            font-size: clamp(0.85rem, 2.5vw, 1rem);
            font-weight: 500;
            color: #f1f5f9;
            flex-grow: 1;
            user-select: all;
            word-break: break-all;
        }

        .copy-button {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #f1f5f9;
            border: 1px solid rgba(125, 211, 252, 0.25);
            padding: clamp(0.4rem, 2vw, 0.5rem) clamp(0.8rem, 2.5vw, 1rem);
            border-radius: clamp(4px, 1vw, 6px);
            font-size: clamp(0.7rem, 2vw, 0.85rem);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            min-width: clamp(50px, 12vw, 70px);
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }

        .copy-button:hover {
            transform: scale(1.05);
            border-color: rgba(125, 211, 252, 0.4);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
        }

        .copy-button.copied {
            background: linear-gradient(135deg, #0ea5e9, #7dd3fc);
            color: white;
            border-color: rgba(125, 211, 252, 0.6);
        }

        /* Social Media Icons */
        .social-section {
            text-align: center;
        }

        .social-logos {
            display: flex;
            justify-content: center;
            gap: clamp(1rem, 4vw, 2rem);
            flex-wrap: wrap;
        }

        .social-logo {
            width: clamp(48px, 10vw, 64px);
            height: clamp(48px, 10vw, 64px);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: clamp(12px, 3vw, 16px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .social-logo::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(125, 211, 252, 0.1), transparent);
            transition: left 0.6s ease;
        }

        .social-logo:hover::before {
            left: 100%;
        }

        .social-logo:hover {
            transform: translateY(-4px) scale(1.05);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(125, 211, 252, 0.3);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
        }

        .social-icon {
            width: clamp(24px, 5vw, 32px);
            height: clamp(24px, 5vw, 32px);
        }

        /* Enhanced Responsive Design */
        @media (max-width: 1024px) {
            .main-container {
                padding: 2.5rem 1.5rem;
                gap: 3.5rem;
            }
            
            .certificates-grid {
                grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            }
        }

        /* Fix for 880px to 1030px range - prevents certificate deformation */
        @media (min-width: 880px) and (max-width: 1030px) {
            .certificates-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.5rem;
            }
            
            .certificate-card {
                min-height: 100px;
                padding: 1.5rem 2rem;
            }
            
            .certificate-name {
                font-size: 1.1rem;
                margin-right: 1.2rem;
            }
            
            .verify-button {
                padding: 0.6rem 1.3rem;
                font-size: 0.85rem;
                min-width: 90px;
            }
        }

        /* Default desktop screen - 2 certificates per row */
        @media (min-width: 1031px) {
            .certificates-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 2rem;
            }
        }

        @media (max-width: 768px) {
            .main-container {
                padding: 2rem 1rem;
                gap: 3rem;
            }
            
            .certificates-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            
            .certificate-card {
                padding: 1.5rem;
                min-height: 90px;
            }
            
            .certificate-name {
                font-size: 1rem;
                margin-right: 1rem;
            }
            
            .verify-button {
                padding: 0.6rem 1.2rem;
                font-size: 0.8rem;
                min-width: 90px;
            }
            
            .email-field {
                min-height: 56px;
                padding: 1rem 1.2rem;
            }
            
            .email-text {
                font-size: 0.95rem;
            }
            
            .copy-button {
                padding: 0.45rem 0.9rem;
                font-size: 0.8rem;
                min-width: 65px;
            }
            
            .social-logos {
                gap: 1.5rem;
            }
            
            .social-logo {
                width: 56px;
                height: 56px;
            }
            
            .social-icon {
                width: 28px;
                height: 28px;
            }
        }

        @media (max-width: 640px) {
            .main-container {
                padding: 1.5rem 0.8rem;
                gap: 2.5rem;
            }
            
            .section-title {
                margin-bottom: 2rem;
            }
            
            .certificates-grid {
                gap: 1.2rem;
            }
            
            .certificate-card {
                padding: 1.2rem;
                min-height: 80px;
            }
            
            .email-container {
                margin-bottom: 2rem;
            }
        }

        @media (max-width: 480px) {
            .main-container {
                padding: 1rem 0.5rem;
                gap: 2rem;
            }
            
            .certificate-card {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
                min-height: auto;
                padding: 1.2rem;
            }
            
            .certificate-name {
                margin-right: 0;
                margin-bottom: 0.5rem;
                font-size: 0.95rem;
            }
            
            .verify-button {
                width: 100%;
                max-width: 200px;
            }
            
            .email-field {
                flex-direction: column;
                gap: 0.8rem;
                min-height: auto;
                padding: 1rem;
                text-align: center;
            }
            
            .email-text {
                margin-bottom: 0.5rem;
            }
            
            .copy-button {
                width: 100%;
                max-width: 120px;
            }
            
            .social-logos {
                gap: 1rem;
            }
            
            .social-logo {
                width: 48px;
                height: 48px;
            }
            
            .social-icon {
                width: 24px;
                height: 24px;
            }
        }

        @media (max-width: 360px) {
            .main-container {
                padding: 0.8rem 0.3rem;
                gap: 1.5rem;
            }
            
            .section-title {
                font-size: 1.5rem;
                margin-bottom: 1.5rem;
            }
            
            .certificate-card {
                padding: 1rem;
            }
            
            .certificate-name {
                font-size: 0.9rem;
            }
            
            .verify-button {
                font-size: 0.75rem;
                padding: 0.5rem 1rem;
            }
            
            .email-field {
                padding: 0.8rem;
            }
            
            .email-text {
                font-size: 0.8rem;
            }
            
            .copy-button {
                font-size: 0.7rem;
                padding: 0.4rem 0.8rem;
            }
        }

        /* Landscape orientation adjustments */
        @media (max-height: 500px) and (orientation: landscape) {
            .main-container {
                padding: 1rem;
                gap: 2rem;
            }
            
            .section-title {
                font-size: 1.8rem;
                margin-bottom: 1.5rem;
            }
            
            .certificate-card {
                min-height: 70px;
                padding: 1rem;
            }
            
            .email-field {
                min-height: 50px;
            }
            
            .social-logo {
                width: 50px;
                height: 50px;
            }
        }

        /* High DPI displays */
        @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
            .section-title {
                text-shadow: 0 0 10px rgba(125, 211, 252, 0.3);
            }
        }
    </style>
</head>

                    <div class="email-text">arafaychaudhry@gmail.com</div>
                    <button class="copy-button" onclick="copyEmail()" id="copyBtn">Copy</button>

    <script>
        // Copy email function
        function copyEmail() {
            const email = 'arafaychaudhry@gmail.com';
            const button = document.getElementById('copyBtn');
            
            navigator.clipboard.writeText(email).then(() => {
                button.textContent = 'Copied!';
                button.classList.add('copied');
                
                setTimeout(() => {
                    button.textContent = 'Copy';
                    button.classList.remove('copied');
                }, 2000);
            }).catch(() => {
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = email;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                
                button.textContent = 'Copied!';
                button.classList.add('copied');
                
                setTimeout(() => {
                    button.textContent = 'Copy';
                    button.classList.remove('copied');
                }, 2000);
            });
        }

        // Updated social media functions
        function openGithub() {
            window.open('https://github.com/CH-RAFAY', '_blank');
        }

        function openLinkedIn() {
            window.open('https://www.linkedin.com/in/rafay-chaudhry-54b671301', '_blank');
        }

        // GSAP Animations
        gsap.registerPlugin(ScrollTrigger);

        // Animate elements on load
        const tl = gsap.timeline();

        tl.fromTo('.section-title', 
            { opacity: 0, y: 30 },
            { opacity: 1, y: 0, duration: 0.8, stagger: 0.2, ease: "power3.out" }
        )
        .fromTo('.certificate-card', 
            { opacity: 0, x: -40, scale: 0.95 },
            { opacity: 1, x: 0, scale: 1, duration: 0.6, stagger: 0.1, ease: "power3.out" }, 
            "-=0.3"
        )
        .fromTo('.email-field', 
            { opacity: 0, y: 30, scale: 0.95 },
            { opacity: 1, y: 0, scale: 1, duration: 0.6, ease: "power3.out" }, 
            "-=0.2"
        )
        .fromTo('.social-logo', 
            { opacity: 0, y: 30, scale: 0.8 },
            { opacity: 1, y: 0, scale: 1, duration: 0.6, stagger: 0.1, ease: "back.out(1.7)" }, 
            "-=0.2"
        );

        // Add click animations
        document.getElementById('copyBtn').addEventListener('click', function() {
            gsap.to(this, {
                scale: 0.95,
                duration: 0.1,
                yoyo: true,
                repeat: 1,
                ease: "power2.inOut"
            });
        });

        document.querySelectorAll('.social-logo').forEach(logo => {
            logo.addEventListener('click', function() {
                gsap.to(this, {
                    scale: 0.9,
                    duration: 0.1,
                    yoyo: true,
                    repeat: 1,
                    ease: "power2.inOut"
                });
            });
        });

        // Enhanced Heading Glow Effect (Mouse Tracking)
        const headingGlowElements = document.querySelectorAll('.section-title');
        
        headingGlowElements.forEach(heading => {
            document.body.addEventListener('mousemove', (e) => {
                const rect = heading.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                heading.style.setProperty('--x', `${x}px`);
                heading.style.setProperty('--y', `${y}px`);
            });
        });
    </script>
</body>
</html>
