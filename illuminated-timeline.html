<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Illuminated Timeline - AR UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Css/navbar.css">
    <link rel="stylesheet" href="Css/Style-3.css">
    <link rel="stylesheet" href="Css/arui.css">

</head>
<body style="background:#000; margin:0;">
    <a href="index.html#components" class="demo-back-link">← Back to AR UI</a>
    <!-- Navbar removed -->

    <!-- Main Timeline Section -->
    <section class="timeline-section">
        <header class="timeline-header">
            <h2 data-text="Illuminated Timeline">Illuminated Timeline</h2>
            <p>Scroll to reveal the luminous path and ripple activation on each node.</p>
        </header>

        <div class="timeline-container">
            <svg class="timeline-svg">
                <line class="timeline-path" x1="2" y1="0" x2="2" y2="100%" />
            </svg>
        </div>
    </section>

    <footer class="developer-credit">Developed by <span>Abdul Rafay Ather</span> · Software Engineer</footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="JS/illuminated-timeline.js"></script>
</body>
</html>
