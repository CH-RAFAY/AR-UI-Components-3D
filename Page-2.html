<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exp-4</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="Css/Style-2.css">
    <link rel="stylesheet" href="Css/page-transitions.css">
</head>
<body>
    <!-- Page Transition Overlay -->
    <div class="page-transition-overlay" id="pageTransitionOverlay"></div>
    
    <!-- Scroll Indicator -->
    <div class="scroll-indicator" id="scrollIndicator">
        <div class="scroll-indicator-text">Scroll Down</div>
        <div class="scroll-indicator-arrow">
            <svg viewBox="0 0 24 24">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        </div>
    </div>
    
    <!-- Page Progress Indicator -->
    <div class="page-progress" id="pageProgress">
        <div class="page-progress-dot" data-page="0"></div>
        <div class="page-progress-dot active" data-page="1"></div>
        <div class="page-progress-dot" data-page="2"></div>
        <div class="page-progress-dot" data-page="3"></div>
    </div>
    <section id="synapse-section">
        <canvas id="synapseCanvas"></canvas>
        <div class="foreground-content">
            <section class="skills-section">
                <div class="nexus-container" id="nexus">
                    <div class="nexus-core" id="nexus-core">
                        <span id="core-skill-name"></span>
                    </div>
                    <svg id="connector-svg">
                        <line id="connector-line" />
                    </svg>
                    <!-- Skill nodes are populated by the script -->
                </div>
            </section>
        </div>
    </section>

    <script src="JS/JS-2.js"></script>
    <script src="JS/page-scroll.js"></script>
</body>
</html>
