<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2nd Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000;
            --primary-accent: #7dd3fc;
            --primary-accent-dark: #0ea5e9;
            --primary-accent-glass: rgba(125, 211, 252, 0.15);
            --primary-accent-dim: rgba(125, 211, 252, 0.4);
            --text-light: #f1f5f9;
            --text-medium: #aeaeae;
            --glass-bg: rgba(15, 15, 15, 0.3);
            --glass-border: rgba(255, 255, 255, 0.1);
            --font-inter: 'Inter', sans-serif;
            --font-orbitron: 'Orbitron', sans-serif;
            --font-poppins: 'Poppins', sans-serif;
            --timeline-width: 4px;
            --dim-text-color: #3a3a3a;
            --heading-glow-color: rgba(14, 165, 233, 0.6);
            --glow-size: 175px;
            --reveal-size: 120px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(ellipse at center, #0a0a0a 0%, #000000 100%);
            color: var(--text-light);
            font-family: var(--font-inter);
            cursor: default;
            overflow-x: hidden;
        }
        .timeline-section {
            width: 100%;
            padding: 100px 5%;
            position: relative;
            z-index: 10;
        }
        .timeline-header {
            text-align: center;
            margin-bottom: 150px;
        }
        @keyframes glow-scan {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        .timeline-header h2 {
            position: relative;
            font-family: var(--font-poppins);
            font-weight: 700;
            font-size: 3.5rem;
            color: var(--dim-text-color);
            user-select: none;
            z-index: 10;
            display: inline-block;
        }
        .timeline-header h2:hover::after {
            opacity: 0;
        }
        .timeline-header h2::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            background: linear-gradient(
                90deg, 
                var(--dim-text-color), 
                #b0b8c4,
                var(--dim-text-color)
            );
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: glow-scan 10s linear infinite alternate;
            transition: opacity 0.3s ease-out;
        }
        .timeline-header h2::before {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            background: radial-gradient(
                circle var(--glow-size) at var(--x, 50%) var(--y, 50%),
                var(--heading-glow-color),
                transparent 65%
            );
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-clip-path: circle(var(--reveal-size) at var(--x, 50%) var(--y, 50%));
            clip-path: circle(var(--reveal-size) at var(--x, 50%) var(--y, 50%));
        }
        .timeline-header p {
            font-size: 1.2rem;
            color: var(--text-medium);
            max-width: 600px;
            margin: 15px auto 0;
        }
        .timeline-container {
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
        }
        .timeline-svg {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: var(--timeline-width);
            pointer-events: none;
            z-index: 12;
            opacity: 0;
        }
        .timeline-path {
            stroke: var(--primary-accent);
            stroke-width: var(--timeline-width);
            opacity: 0.15;
            stroke-linecap: round;
        }
        .project-entry {
            padding: 80px 0;
            position: relative;
            width: 50%;
            z-index: 20;
            perspective: 1500px;
        }
        .project-entry.align-left { left: 0; padding-right: 50px; }
        .project-entry.align-right { left: 50%; padding-left: 50px; }




        /* Timeline Node Styles (Unchanged) */
        .project-node {
            position: absolute; top: 50%; width: 20px; height: 20px; border-radius: 50%;
            background: var(--bg-dark); border: 3px solid var(--primary-accent-dim);
            box-shadow: 0 0 6px 1px var(--primary-accent-dim);
            transition: box-shadow 0.5s ease, border-color 0.5s ease, transform 0.4s cubic-bezier(.4,2,.6,1);
            transform: translateY(-50%) scale(1); z-index: 30; display: flex;
            align-items: center; justify-content: center; overflow: visible;
        }
        .align-left .project-node { right: -10px; }
        .align-right .project-node { left: -10px; }
        .project-entry.is-active .project-node {
            border-color: var(--primary-accent);
            box-shadow: 0 0 10px 2px var(--primary-accent);
        }
        @keyframes ripple-wave { from { transform: scale(1); opacity: 0.6; } to { transform: scale(4.5); opacity: 0; } }
        .ripple { position: absolute; width: 100%; height: 100%; border: 1.5px solid var(--primary-accent); border-radius: 50%; transform: scale(1); opacity: 0; pointer-events: none; }
        .project-entry.is-active .project-node .ripple { animation: ripple-wave 1.5s ease-out; }
        .project-entry.is-active .project-node .ripple:nth-of-type(2) { animation-delay: 1.0s; }
        .project-fill { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; pointer-events: none; border-radius: 50%; background: radial-gradient(circle at 60% 35%, rgba(125,211,252,0.65) 0%, rgba(14,165,233,0.45) 55%, rgba(14,165,233,0.25) 80%, rgba(0,0,0,0.10) 100%); box-shadow: 0 0 7px 1px var(--primary-accent-glass), 0 0 14px 2px var(--primary-accent-dark); opacity: 0; transform: translate(-50%, -50%) scale(0.7); transition: opacity 0.7s cubic-bezier(.4,1,.6,1), transform 0.7s cubic-bezier(.4,1,.6,1), box-shadow 0.7s cubic-bezier(.4,1,.6,1); }
        .project-entry.is-active .project-fill { opacity: 1; transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 10px 2px var(--primary-accent-glass), 0 0 18px 4px var(--primary-accent-dark); }
        .project-fill::after { content: ""; position: absolute; left: 18%; top: 18%; width: 32%; height: 32%; background: radial-gradient(circle, rgba(255,255,255,0.38) 0%, rgba(255,255,255,0.05) 100%); border-radius: 50%; filter: blur(0.5px); opacity: 0.7; }
        
        /* --- MODIFIED PROJECT PANEL STYLES --- */
        .project-panel {
            padding: 30px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.03) 50%, rgba(255, 255, 255, 0.06) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            position: relative;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05), 0 20px 50px rgba(0, 0, 0, 0.5);
            transition: box-shadow 0.5s ease;
            visibility: hidden;
            border-radius: 24px;
            overflow: hidden;
        }


        .project-panel::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(125, 211, 252, 0.1), transparent);
            transition: left 0.8s ease;
            z-index: 2; 
        }


        .project-panel:hover::before {
            left: 100%;
        }


        /* IMPROVEMENT: Increased light intensity */
        .project-entry.is-active .project-panel {
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05), 0 30px 80px rgba(0, 0, 0, 0.6), 0 0 25px rgba(14, 165, 233, 0.2);
        }
        .project-entry.is-active .project-panel:hover {
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05), 0 35px 90px rgba(0, 0, 0, 0.7), 0 0 40px rgba(14, 165, 233, 0.45);
        }
        
        /* --- MODIFIED CORNER ACCENT STYLES --- */
        .corner-accent {
            position: absolute;
            width: 32px;
            height: 32px;
            border: 3.5px solid var(--primary-accent-dim);
            opacity: 0;
            transition: all 0.4s ease, transform 0.4s ease;
            transform: scale(1.2);
            z-index: 5;
        }
        .project-entry.is-active .corner-accent {
            opacity: 0.5;
            transform: scale(1);
        }
        .project-panel:hover .corner-accent {
            border-color: var(--primary-accent);
            transform: scale(1.15);
            opacity: 0.8;
        }
        .corner-accent.top-left { top: -3.5px; left: -3.5px; border-right: none; border-bottom: none; border-top-left-radius: 24px; }
        .corner-accent.top-right { top: -3.5px; right: -3.5px; border-left: none; border-bottom: none; border-top-right-radius: 24px; }
        .corner-accent.bottom-left { bottom: -3.5px; left: -3.5px; border-right: none; border-top: none; border-bottom-left-radius: 24px; }
        .corner-accent.bottom-right { bottom: -3.5px; right: -3.5px; border-left: none; border-top: none; border-bottom-right-radius: 24px; }



        /* Panel Content Styles */
        .panel-content { 
            display: flex; 
            flex-direction: column; 
            gap: 20px;
            position: relative;
            z-index: 3;
        }
        .panel-main { display: grid; grid-template-columns: 1fr 2fr; gap: 25px; align-items: center; }
        .panel-image { border-radius: 10px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); position: relative; }
        .panel-image::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 10px; box-shadow: inset 0 0 15px 5px rgba(125, 211, 252, 0.4); opacity: 0; transition: opacity 0.5s ease; }
        .project-entry.is-active .panel-image::after { opacity: 1; }
        .panel-image img { width: 100%; height: auto; display: block; transition: transform 0.5s ease; }
        .project-panel:hover .panel-image img { transform: scale(1.05); }
        .panel-title { font-family: var(--font-poppins); font-weight: 600; font-size: 1.8rem; color: var(--text-light); margin-bottom: 15px; transition: text-shadow 0.5s ease; }
        .project-entry.is-active .panel-title { text-shadow: 0 0 12px rgba(125, 211, 252, 0.3); }
        .panel-description { font-size: 1rem; line-height: 1.6; color: var(--text-medium); }
        .panel-tags { display: flex; flex-wrap: wrap; gap: 10px; }
        .panel-tags span { background-color: rgba(125, 211, 252, 0.1); color: var(--primary-accent); padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 500; border: 1px solid rgba(125, 211, 252, 0.2); transition: all 0.3s ease; }
        .panel-tags span::before { content: '# '; opacity: 0.7; }
        .panel-tags span:hover { background-color: rgba(125, 211, 252, 0.2); box-shadow: 0 0 10px rgba(125, 211, 252, 0.2); transform: translateY(-2px); }
        .panel-actions { display: flex; gap: 15px; margin-top: 15px; padding-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.1); }
        .panel-button { background: linear-gradient(135deg,rgba(255,255,255,.03),rgba(255,255,255,.01)); backdrop-filter: blur(10px); border: 1.5px solid rgba(255,255,255,.1); box-shadow: 0 8px 20px rgba(0,0,0,.3); transition: all .3s ease; overflow: hidden; border-radius: 12px; color: #cbd5e1; font-weight: 500; cursor: pointer; position: relative; padding: 8px 18px; text-decoration: none; font-size: 0.9rem; }
        .panel-button::before{ content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(125,211,252,.15),transparent);transition:left .5s ease }
        .panel-button:hover::before{left:100%}
        .panel-button:hover{border-color:rgba(125,211,252,.4);box-shadow:0 0 15px rgba(125,211,252,.15);color:#f1f5f9;}



        /* Responsive Styles (Unchanged) */
        @media (max-width: 992px) {
            .timeline-svg { left: 32px; }
            .project-entry { width: 100%; padding-left: 70px; padding-right: 0; }
            .project-entry.align-right { left: 0; padding-left: 70px; }
            .project-node { left: 10px; right: auto; }
        }
        @media (max-width: 768px) {
            .panel-main { grid-template-columns: 1fr; }
            .panel-image { max-width: 100%; margin: 0; }
        }
    </style>
</head>
<body>
    <section class="timeline-section">
        <header class="timeline-header">
            <h2 data-text="Project Chronology">Project Chronology</h2>
            <p>An interactive journey through my key projects, showcasing the evolution of my skills and problem-solving abilities over time.</p>
        </header>
        <div class="timeline-container">
            <svg class="timeline-svg">
                <line class="timeline-path" x1="2" y1="0" x2="2" y2="100%"/>
            </svg>
        </div>
    </section>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        gsap.registerPlugin(ScrollTrigger);


        const projects = [
            { title: "QuantumCart", description: "A full-stack e-commerce platform with a focus on user experience and secure payment processing.", year: "2021", image: "https://images.unsplash.com/photo-1522199755839-a2bacb67c546?q=80&w=800&auto=format&fit=crop", tags: ["Next.js", "Stripe", "PostgreSQL", "Tailwind CSS"], liveUrl: "#", repoUrl: "#" },
            { title: "AetherFlow", description: "A sleek, cross-platform mobile application for intuitive task management and real-time productivity tracking.", year: "2022", image: "https://images.unsplash.com/photo-1607706189992-5a5ee42c5aa8?q=80&w=800&auto=format&fit=crop", tags: ["React Native", "Firebase", "GSAP", "Redux"], liveUrl: "#", repoUrl: "#" },
            { title: "SynapseAI", description: "An intelligent conversational AI built to understand user intent and provide contextually relevant responses.", year: "2023", image: "https://images.unsplash.com/photo-1555949963-ff9fe0c870eb?q=80&w=800&auto=format&fit=crop", tags: ["Python", "TensorFlow", "Flask", "NLP"], liveUrl: "#", repoUrl: "#" },
            { title: "Axiom Data", description: "An interactive data visualization dashboard designed to make complex datasets accessible and engaging.", year: "2024", image: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=800&auto=format&fit=crop", tags: ["D3.js", "React", "Node.js", "BigQuery"], liveUrl: "#", repoUrl: "#" }
        ];


        const timelineContainer = document.querySelector('.timeline-container');
        
        projects.forEach((project, index) => {
            const alignment = index % 2 === 0 ? 'align-left' : 'align-right';
            const entry = document.createElement('div');
            entry.className = `project-entry ${alignment}`;
            const tagsHTML = project.tags.map(tag => `<span>${tag}</span>`).join('');
            entry.innerHTML = `
                <div class="project-node">
                    <span class="project-fill"></span>
                    <div class="ripple"></div>
                    <div class="ripple"></div>
                </div>
                <div class="project-panel">
                    <div class="corner-accent top-left"></div>
                    <div class="corner-accent top-right"></div>
                    <div class="corner-accent bottom-left"></div>
                    <div class="corner-accent bottom-right"></div>
                    <div class="panel-content">
                        <div class="panel-main">
                            <div class="panel-image">
                                <img src="${project.image}" alt="${project.title}">
                            </div>
                            <div class="panel-text">
                                <h3 class="panel-title">${project.title} (${project.year})</h3>
                                <p class="panel-description">${project.description}</p>
                            </div>
                        </div>
                        <div class="panel-tags">
                            ${tagsHTML}
                        </div>
                        <div class="panel-actions">
                            <a href="${project.liveUrl}" target="_blank" rel="noopener noreferrer" class="panel-button">Live Demo</a>
                            <a href="${project.repoUrl}" target="_blank" rel="noopener noreferrer" class="panel-button">View Code</a>
                        </div>
                    </div>
                </div>
            `;
            timelineContainer.appendChild(entry);
        });


        // GSAP and other JS logic remains unchanged
        function setupAdvancedTimeline() {
            const projectNodes = document.querySelectorAll('.project-node');
            const svg = document.querySelector('.timeline-svg');
            const path = document.querySelector('.timeline-path');
            if (projectNodes.length < 2) return;
            const containerRect = timelineContainer.getBoundingClientRect();
            const firstNodeRect = projectNodes[0].getBoundingClientRect();
            const lastNodeRect = projectNodes[projectNodes.length - 1].getBoundingClientRect();
            const y1 = firstNodeRect.top + firstNodeRect.height / 2 - containerRect.top;
            const height = (lastNodeRect.top + lastNodeRect.height / 2) - (firstNodeRect.top + firstNodeRect.height / 2);
            svg.setAttribute('height', height);
            svg.style.top = y1 + 'px';
            path.setAttribute('y2', height);
            const pathTotalLength = path.getTotalLength();
            path.style.strokeDasharray = pathTotalLength;
            path.style.strokeDashoffset = pathTotalLength;
            const masterTl = gsap.timeline({ paused: true });
            let lastOffset = pathTotalLength;
            projectNodes.forEach((node, index) => {
                const nodeRect = node.getBoundingClientRect();
                const nodeCenterY = (nodeRect.top + nodeRect.height / 2) - (firstNodeRect.top + firstNodeRect.height / 2);
                const progress = nodeCenterY / height;
                const currentOffset = pathTotalLength * (1 - progress);
                const duration = Math.abs(currentOffset - lastOffset) / pathTotalLength;
                masterTl.to(path, { strokeDashoffset: currentOffset, duration: duration * 10, ease: "none" });
                masterTl.call(() => {
                    if (!node.classList.contains('connecting-signal')) {
                        node.classList.add('connecting-signal');
                        setTimeout(() => node.classList.remove('connecting-signal'), 1200);
                    }
                }, [], ">");
                if (index < projectNodes.length - 1) { masterTl.to({}, { duration: 2 }); }
                lastOffset = currentOffset;
            });
            ScrollTrigger.create({ trigger: ".timeline-container", start: "top center", end: "bottom bottom", scrub: 1.5, animation: masterTl });
            gsap.to(svg, { opacity: 1, duration: 0.3 });
        }
        setTimeout(() => { setupAdvancedTimeline(); }, 100);


        const projectEntries = document.querySelectorAll('.project-entry');
        projectEntries.forEach(entry => {
            const panel = entry.querySelector('.project-panel');
            const alignment = entry.classList.contains('align-right') ? -1 : 1;
            const tl = gsap.timeline({ paused: true });
            tl.fromTo(panel, 
                { autoAlpha: 0, y: 60, rotationY: -15 * alignment, scale: 0.95, transformOrigin: alignment === 1 ? "right center" : "left center" },
                { autoAlpha: 1, y: 0, rotationY: 0, scale: 1, duration: 0.8, ease: "power3.out" }
            );
            tl.from(entry.querySelectorAll('.panel-image, .panel-title, .panel-description, .panel-tags span, .panel-button'), 
                { opacity: 0, y: 20, stagger: 0.08, ease: "power2.out" },
                "-=0.5"
            );
            ScrollTrigger.create({
                trigger: entry,
                start: "top 65%",
                end: "bottom center",
                animation: tl,
                toggleClass: "is-active",
                toggleActions: "play reverse play reverse"
            });
        });


        const headingGlow = document.querySelector('.timeline-header h2');
        if (headingGlow) {
            document.body.addEventListener('mousemove', (e) => {
                const rect = headingGlow.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                headingGlow.style.setProperty('--x', `${x}px`);
                headingGlow.style.setProperty('--y', `${y}px`);
            });
        }
        window.addEventListener('resize', () => { location.reload(); });
    });
    </script>
</body>
</html>
