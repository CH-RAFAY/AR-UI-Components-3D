<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Background Layer</title>

    <style>
        /* CSS for the interactive background glow effect */

        :root {
            /* These CSS variables are updated by JavaScript */
            /* They control the position and opacity of the glow */
            --mouse-x: 50vw;
            --mouse-y: 50vh;
            --glow-opacity: 0;
        }

        body {
            /* A dark background is essential for the glow to be visible */
            background-color: #000000;
            color: #f1f5f9;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            
            /* Ensures the body takes up the full viewport height */
            margin: 0;
            min-height: 100vh;
        }

        #interactive-background {
            /* This layer is fixed to the viewport and stays behind all content */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Places the layer behind all other content */
            
            /* 
             * The glow is a radial gradient. Its center follows the mouse cursor 
             * (via --mouse-x and --mouse-y) and its color's alpha channel 
             * (transparency) is controlled by --glow-opacity.
             */
            background: radial-gradient(
                800px circle at var(--mouse-x) var(--mouse-y),
                rgba(29, 78, 216, var(--glow-opacity)), /* A professional blue glow */
                transparent 70%
            );
            
            /* This hides the effect by default and fades it in smoothly */
            opacity: 0;
            transition: opacity 0.4s ease-out;
        }

        /* When the user hovers anywhere on the body, the background becomes visible */
        body:hover #interactive-background {
            opacity: 1;
        }

        /* --- Example content styling --- */
        .content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 100vh;
            padding: 2rem;
            box-sizing: border-box;
        }

        .content h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .content p {
            font-size: 1.2rem;
            color: #94a3b8;
            max-width: 600px;
        }
    </style>
</head>
<body>

    <!-- This single div creates the entire interactive background layer -->
    <div id="interactive-background"></div>

    <!-- Your website's main content goes here. The background will appear behind it. -->
    <main class="content">
        <h1>Interactive Background</h1>
        <p>Move your cursor around the page. The glow is brightest at the corners and dims as you move toward the center, creating a subtle and professional effect.</p>
    </main>

    <script>
        // JavaScript to make the background interactive

        document.addEventListener('mousemove', (e) => {
            const body = document.body;
            
            // Get the center coordinates of the window
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            // Get the current mouse coordinates
            const mouseX = e.clientX;
            const mouseY = e.clientY;

            // 1. Calculate the distance of the mouse from the center.
            // We use the Pythagorean theorem: a^2 + b^2 = c^2
            const deltaX = centerX - mouseX;
            const deltaY = centerY - mouseY;
            const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

            // 2. Calculate the maximum possible distance from the center (which is to a corner).
            const maxDistance = Math.sqrt(centerX * centerX + centerY * centerY);

            // 3. Determine the opacity based on how far the cursor is from the center.
            // The result is a value between 0 (at the center) and 1 (at a corner).
            const opacity = distance / maxDistance;

            // 4. Clamp the opacity to a subtle range (e.g., from 0.1 to 0.4).
            // This prevents the glow from becoming too faint or too overpowering.
            // You can adjust these values to your preference.
            const clampedOpacity = Math.max(0.1, Math.min(opacity, 0.4));
            
            // 5. Update the CSS custom properties on the body.
            // The CSS will automatically use these new values to update the background.
            body.style.setProperty('--mouse-x', `${mouseX}px`);
            body.style.setProperty('--mouse-y', `${mouseY}px`);
            body.style.setProperty('--glow-opacity', clampedOpacity);
        });
    </script>

</body>
</html>
