<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Timeline - Your Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Orbitron:wght@700&family=Poppins:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000;
            --primary-accent: #7dd3fc;
            --text-light: #f1f5f9;
            --text-medium: #a3b6c7;
            --glass-bg: rgba(15, 15, 15, 0.3);
            --glass-border: rgba(255, 255, 255, 0.1);
            --font-inter: 'Inter', sans-serif;
            --font-orbitron: 'Orbitron', sans-serif;
            --font-poppins: 'Poppins', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: var(--font-inter);
            cursor: default;
        }
        
        /* --- Dynamic Background --- */
        .background-animated-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(to right, rgba(125, 211, 252, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(125, 211, 252, 0.05) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: pan-grid 80s linear infinite;
            z-index: 1;
        }
        @keyframes pan-grid {
            from { background-position: 0 0; }
            to { background-position: -1200px -1200px; }
        }

        /* --- Timeline Section --- */
        .timeline-section {
            width: 100%;
            padding: 100px 5%;
            position: relative;
            z-index: 10;
        }
        
        .timeline-header {
            text-align: center;
            margin-bottom: 150px;
        }
        .timeline-header h2 {
            font-family: var(--font-orbitron);
            font-size: 3.5rem;
            color: var(--primary-accent);
        }
        .timeline-header p {
            font-size: 1.2rem;
            color: var(--text-medium);
            max-width: 600px;
            margin: 15px auto 0;
        }

        .timeline-container {
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* The central time-bar */
        .timeline-container::after {
            content: '';
            position: absolute;
            width: 4px;
            background: linear-gradient(to bottom, transparent, var(--primary-accent), transparent);
            top: 0;
            bottom: 0;
            left: 50%;
            margin-left: -2px;
            z-index: 15;
            opacity: 0.3;
        }

        /* Individual project entry container */
        .project-entry {
            padding: 50px 0;
            position: relative;
            width: 50%;
        }

        /* Positioning for left and right alignment */
        .project-entry.align-left {
            left: 0;
            padding-right: 50px;
        }
        .project-entry.align-right {
            left: 50%;
            padding-left: 50px;
        }
        
        /* The node on the timeline */
        .project-node {
            position: absolute;
            top: 50%;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: var(--glass-border);
            border: 3px solid var(--primary-accent);
            z-index: 20;
            transform: translateY(-50%);
            transition: all 0.5s ease;
        }
        .align-left .project-node { right: -10px; }
        .align-right .project-node { left: -10px; }
        
        /* Active state for the node */
        .project-entry.is-active .project-node {
            transform: translateY(-50%) scale(1.5);
            box-shadow: 0 0 20px var(--primary-accent);
        }

        /* The main glass panel for project info */
        .project-panel {
            padding: 30px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
            opacity: 0.2; /* Inactive state */
            transform: translateY(50px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        
        .project-entry.is-active .project-panel {
            opacity: 1;
            transform: translateY(0);
        }

        .panel-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 25px;
            align-items: center;
        }
        
        .panel-image img {
            width: 100%;
            border-radius: 10px;
            object-fit: cover;
        }

        .panel-title {
            font-family: var(--font-poppins);
            font-weight: 600;
            font-size: 1.8rem;
            color: var(--text-light);
            margin-bottom: 10px;
        }
        
        .panel-description {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-medium);
        }
        
        @media (max-width: 992px) {
            .timeline-container::after { left: 20px; }
            .project-entry { width: 100%; padding-left: 70px; padding-right: 0; }
            .project-entry.align-right { left: 0; padding-left: 70px; }
            .project-node { left: 10px; }
        }
        @media (max-width: 768px) {
            .panel-content { grid-template-columns: 1fr; }
            .panel-image { display: none; } /* Hide image on smallest screens for clarity */
        }

    </style>
</head>
<body>
    <div class="background-animated-grid"></div>

    <section class="timeline-section">
        <header class="timeline-header">
            <h2>Project Chronology</h2>
            <p>An interactive journey through my key projects, showcasing the evolution of my skills and problem-solving abilities over time.</p>
        </header>

        <div class="timeline-container">
            <!-- Projects will be injected here by JS -->
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        gsap.registerPlugin(ScrollTrigger);

        const projects = [
            { title: "QuantumCart", description: "A full-stack e-commerce platform with a focus on user experience and secure payment processing.", year: "2021", image: "https://images.unsplash.com/photo-1522199755839-a2bacb67c546?q=80&w=800&auto=format&fit=crop" },
            { title: "AetherFlow", description: "A sleek, cross-platform mobile application for intuitive task management and real-time productivity tracking.", year: "2022", image: "https://images.unsplash.com/photo-1607706189992-5a5ee42c5aa8?q=80&w=800&auto=format&fit=crop" },
            { title: "SynapseAI", description: "An intelligent conversational AI built to understand user intent and provide contextually relevant responses.", year: "2023", image: "https://images.unsplash.com/photo-1555949963-ff9fe0c870eb?q=80&w=800&auto=format&fit=crop" },
            { title: "Axiom Data", description: "An interactive data visualization dashboard designed to make complex datasets accessible and engaging.", year: "2024", image: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=800&auto=format&fit=crop" }
        ];

        const timelineContainer = document.querySelector('.timeline-container');

        // Populate the timeline
        projects.forEach((project, index) => {
            const alignment = index % 2 === 0 ? 'align-left' : 'align-right';
            
            const entry = document.createElement('div');
            entry.className = `project-entry ${alignment}`;
            entry.innerHTML = `
                <div class="project-node"></div>
                <div class="project-panel">
                    <div class="panel-content">
                        <div class="panel-image">
                            <img src="${project.image}" alt="${project.title}">
                        </div>
                        <div class="panel-text">
                            <h3 class="panel-title">${project.title} (${project.year})</h3>
                            <p class="panel-description">${project.description}</p>
                        </div>
                    </div>
                </div>
            `;
            timelineContainer.appendChild(entry);
        });

        // GSAP ScrollTrigger Animation
        const projectEntries = document.querySelectorAll('.project-entry');
        
        projectEntries.forEach(entry => {
            ScrollTrigger.create({
                trigger: entry,
                start: "top center",
                end: "bottom center",
                onEnter: () => entry.classList.add('is-active'),
                onLeave: () => entry.classList.remove('is-active'),
                onEnterBack: () => entry.classList.add('is-active'),
                onLeaveBack: () => entry.classList.remove('is-active'),
            });
        });
    });
    </script>
</body>
</html>
