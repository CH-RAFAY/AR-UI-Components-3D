<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-5 Final Polish - Updated</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Orbitron:wght@700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000;
            --primary-accent: #7dd3fc;
            --primary-accent-dark: #0ea5e9;
            --primary-accent-glass: rgba(125, 211, 252, 0.15);
            --primary-accent-dim: rgba(125, 211, 252, 0.4);
            --text-light: #f1f5f9;
            --text-medium: #aeaeae;
            --glass-bg: rgba(15, 15, 15, 0.3);
            --glass-border: rgba(255, 255, 255, 0.1);
            --font-inter: 'Inter', sans-serif;
            --font-orbitron: 'Orbitron', sans-serif;
            --font-poppins: 'Poppins', sans-serif;
            --timeline-width: 4px;
            --dim-text-color: #3a3a3a;
            --heading-glow-color: rgba(14, 165, 233, 0.6);
            --glow-size: 175px;
            --reveal-size: 120px;
       }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(ellipse at center, #0a0a0a 0%, #000000 100%);
            color: var(--text-light);
            font-family: var(--font-inter);
            cursor: default;
        }
        .timeline-section {
            width: 100%;
            padding: 100px 5%;
            position: relative;
            z-index: 10;
        }
        .timeline-header {
            text-align: center;
            margin-bottom: 150px;
        }
        @keyframes glow-scan {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        .timeline-header h2 {
            position: relative;
            font-family: var(--font-poppins);
            font-weight: 700;
            font-size: 3.5rem;
            color: var(--dim-text-color);
            user-select: none;
            z-index: 10;
            display: inline-block;
        }
        .timeline-header h2:hover::after {
            opacity: 0;
        }
        .timeline-header h2::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            background: linear-gradient(
                90deg, 
                var(--dim-text-color), 
                #b0b8c4,
                var(--dim-text-color)
            );
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: glow-scan 10s linear infinite alternate;
            transition: opacity 0.3s ease-out;
        }
        .timeline-header h2::before {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            background: radial-gradient(
                circle var(--glow-size) at var(--x, 50%) var(--y, 50%),
                var(--heading-glow-color),
                transparent 65%
            );
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-clip-path: circle(var(--reveal-size) at var(--x, 50%) var(--y, 50%));
            clip-path: circle(var(--reveal-size) at var(--x, 50%) var(--y, 50%));
        }
        .timeline-header p {
            font-size: 1.2rem;
            color: var(--text-medium);
            max-width: 600px;
            margin: 15px auto 0;
        }
        .timeline-container {
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
        }
        .timeline-svg {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: var(--timeline-width);
            pointer-events: none;
            z-index: 12;
            opacity: 0; /* FIX: Initially hide the SVG to prevent flash */
        }
        .timeline-path {
            stroke: var(--primary-accent);
            stroke-width: var(--timeline-width);
            opacity: 0.15;
            stroke-linecap: round;
        }
        .project-entry {
            padding: 80px 0;
            position: relative;
            width: 50%;
            z-index: 20;
        }
        .project-entry.align-left {
            left: 0;
            padding-right: 50px;
        }
        .project-entry.align-right {
            left: 50%;
            padding-left: 50px;
        }
        .project-node {
            position: absolute;
            top: 50%;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--bg-dark);
            border: 3px solid var(--primary-accent-dim);
            box-shadow: 0 0 6px 1px var(--primary-accent-dim);
            transition: box-shadow 0.5s ease, border-color 0.5s ease, transform 0.4s cubic-bezier(.4,2,.6,1);
            transform: translateY(-50%) scale(1);
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
        }
        .align-left .project-node { right: -10px; }
        .align-right .project-node { left: -10px; }
        
        @keyframes ripple-wave {
            from {
                transform: scale(1);
                opacity: 0.6;
            }
            to {
                transform: scale(4.5);
                opacity: 0;
            }
        }
        .ripple {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1.5px solid var(--primary-accent);
            border-radius: 50%;
            transform: scale(1);
            opacity: 0;
            pointer-events: none;
        }
        .project-entry.is-active .project-node .ripple {
            animation: ripple-wave 1.5s ease-out;
        }
        .project-entry.is-active .project-node .ripple:nth-of-type(2) {
            animation-delay: 1.0s;
        }
        .project-fill {
            position: absolute;
            top: 50%; left: 50%;
            width: 14px; height: 14px;
            pointer-events: none;
            border-radius: 50%;
            background: radial-gradient(circle at 60% 35%,
                rgba(125,211,252,0.65) 0%,
                rgba(14,165,233,0.45) 55%,
                rgba(14,165,233,0.25) 80%,
                rgba(0,0,0,0.10) 100%
            );
            box-shadow:
                0 0 7px 1px var(--primary-accent-glass),
                0 0 14px 2px var(--primary-accent-dark);
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.7);
            transition:
                opacity 0.7s cubic-bezier(.4,1,.6,1),
                transform 0.7s cubic-bezier(.4,1,.6,1),
                box-shadow 0.7s cubic-bezier(.4,1,.6,1);
        }
        .project-entry.is-active .project-fill {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            box-shadow:
                0 0 10px 2px var(--primary-accent-glass),
                0 0 18px 4px var(--primary-accent-dark);
        }
        .project-fill::after {
            content: "";
            position: absolute;
            left: 18%;
            top: 18%;
            width: 32%;
            height: 32%;
            background: radial-gradient(circle, rgba(255,255,255,0.38) 0%, rgba(255,255,255,0.05) 100%);
            border-radius: 50%;
            filter: blur(0.5px);
            opacity: 0.7;
        }
        @keyframes scale-up-node {
            to {
                transform: translateY(-50%) scale(1.13);
            }
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 10px 2px var(--primary-accent); }
            100% { box-shadow: 0 0 16px 4px var(--primary-accent); }
        }
        .project-entry.is-active .project-node {
            border-color: var(--primary-accent);
            box-shadow: 0 0 10px 2px var(--primary-accent);
            animation: 
                scale-up-node 0.5s 2.5s forwards ease-out,
                pulse 1.2s 2.5s infinite alternate;
        }
        @keyframes connect-signal {
            50% { box-shadow: 0 0 20px 6px var(--primary-accent); }
        }
        .project-node.connecting-signal {
            animation: connect-signal 0.4s ease-in-out 3;
        }
        .project-panel {
            padding: 30px;
            background: rgba(15, 20, 30, 0.42);
            border: 1px solid rgba(125,211,252,0.09);
            border-radius: 15px;
            backdrop-filter: blur(18px) saturate(160%);
            -webkit-backdrop-filter: blur(18px) saturate(160%);
            position: relative;
            opacity: 0.2;
            transform: translateY(50px);
            transition: opacity 1s cubic-bezier(.4,1,.6,1), transform 1s cubic-bezier(.4,1,.6,1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .project-entry.is-active .project-panel {
            opacity: 1;
            transform: translateY(0);
        }
        .panel-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 25px;
            align-items: center;
        }
        .panel-image {
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        .panel-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .project-entry.is-active .panel-image img {
            transform: scale(1.03);
        }
        .panel-title {
            font-family: var(--font-poppins);
            font-weight: 600;
            font-size: 1.8rem;
            color: var(--text-light);
            margin-bottom: 10px;
        }
        .panel-description {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-medium);
        }
        @media (max-width: 992px) {
            .timeline-svg { left: 32px; }
            .project-entry { width: 100%; padding-left: 70px; padding-right: 0; }
            .project-entry.align-right { left: 0; padding-left: 70px; }
            .project-node { left: 10px; right: auto; }
        }
        @media (max-width: 768px) {
            .panel-content { grid-template-columns: 1fr; }
            .panel-image { max-width: 300px; margin: 0 auto; }
        }
    </style>
</head>
<body>
    <section class="timeline-section">
        <header class="timeline-header">
            <h2 data-text="Project Chronology">Project Chronology</h2>
            <p>An interactive journey through my key projects, showcasing the evolution of my skills and problem-solving abilities over time.</p>
        </header>
        <div class="timeline-container">
            <svg class="timeline-svg">
                <line class="timeline-path" x1="2" y1="0" x2="2" y2="100%"/>
            </svg>
        </div>
    </section>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        gsap.registerPlugin(ScrollTrigger);

        const projects = [
            { title: "QuantumCart", description: "A full-stack e-commerce platform with a focus on user experience and secure payment processing.", year: "2021", image: "https://images.unsplash.com/photo-1522199755839-a2bacb67c546?q=80&w=800&auto=format&fit=crop" },
            { title: "AetherFlow", description: "A sleek, cross-platform mobile application for intuitive task management and real-time productivity tracking.", year: "2022", image: "https://images.unsplash.com/photo-1607706189992-5a5ee42c5aa8?q=80&w=800&auto=format&fit=crop" },
            { title: "SynapseAI", description: "An intelligent conversational AI built to understand user intent and provide contextually relevant responses.", year: "2023", image: "https://images.unsplash.com/photo-1555949963-ff9fe0c870eb?q=80&w=800&auto=format&fit=crop" },
            { title: "Axiom Data", description: "An interactive data visualization dashboard designed to make complex datasets accessible and engaging.", year: "2024", image: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=800&auto=format&fit=crop" }
        ];

        const timelineContainer = document.querySelector('.timeline-container');
        const svg = document.querySelector('.timeline-svg');
        const path = document.querySelector('.timeline-path');
        
        projects.forEach((project, index) => {
            const alignment = index % 2 === 0 ? 'align-left' : 'align-right';
            const entry = document.createElement('div');
            entry.className = `project-entry ${alignment}`;
            entry.innerHTML = `
                <div class="project-node">
                    <span class="project-fill"></span>
                    <div class="ripple"></div>
                    <div class="ripple"></div>
                </div>
                <div class="project-panel">
                    <div class="panel-content">
                        <div class="panel-image">
                            <img src="${project.image}" alt="${project.title}">
                        </div>
                        <div class="panel-text">
                            <h3 class="panel-title">${project.title} (${project.year})</h3>
                            <p class="panel-description">${project.description}</p>
                        </div>
                    </div>
                </div>
            `;
            timelineContainer.appendChild(entry);
        });

        function setupAdvancedTimeline() {
            const projectNodes = document.querySelectorAll('.project-node');
            if (projectNodes.length < 2) return;

            const containerRect = timelineContainer.getBoundingClientRect();
            const firstNodeRect = projectNodes[0].getBoundingClientRect();
            const lastNodeRect = projectNodes[projectNodes.length - 1].getBoundingClientRect();
            const y1 = firstNodeRect.top + firstNodeRect.height / 2 - containerRect.top;
            const height = (lastNodeRect.top + lastNodeRect.height / 2) - (firstNodeRect.top + firstNodeRect.height / 2);

            svg.setAttribute('height', height);
            svg.style.top = y1 + 'px';
            path.setAttribute('y2', height);

            const pathTotalLength = path.getTotalLength();
            path.style.strokeDasharray = pathTotalLength;
            path.style.strokeDashoffset = pathTotalLength;

            const masterTl = gsap.timeline({ paused: true });
            let lastOffset = pathTotalLength;
            
            projectNodes.forEach((node, index) => {
                const nodeRect = node.getBoundingClientRect();
                const nodeCenterY = (nodeRect.top + nodeRect.height / 2) - (firstNodeRect.top + firstNodeRect.height / 2);
                
                const progress = nodeCenterY / height;
                const currentOffset = pathTotalLength * (1 - progress);
                const duration = Math.abs(currentOffset - lastOffset) / pathTotalLength;

                masterTl.to(path, {
                    strokeDashoffset: currentOffset,
                    duration: duration * 10,
                    ease: "none"
                });
                
                masterTl.call(() => {
                    if (!node.classList.contains('connecting-signal')) {
                        node.classList.add('connecting-signal');
                        setTimeout(() => node.classList.remove('connecting-signal'), 1200);
                    }
                }, [], ">");
                
                if (index < projectNodes.length - 1) {
                    masterTl.to({}, { duration: 2 });
                }

                lastOffset = currentOffset;
            });
            
            ScrollTrigger.create({
                trigger: ".timeline-container",
                start: "top center",
                end: "bottom bottom",
                scrub: 1.5,
                animation: masterTl
            });
            
            // FIX: Fade the SVG in now that it's positioned correctly
            gsap.to(svg, { opacity: 1, duration: 0.3 });
        }

        setTimeout(() => {
            setupAdvancedTimeline();
        }, 100);

        window.addEventListener('resize', () => {
            location.reload();
        });

        const projectEntries = document.querySelectorAll('.project-entry');
        projectEntries.forEach(entry => {
            ScrollTrigger.create({
                trigger: entry,
                start: "top center",
                end: "bottom center",
                toggleClass: "is-active",
            });
        });

        const lastProjectEntry = document.querySelector('.project-entry:last-of-type');
        if (lastProjectEntry) {
            const lastNode = lastProjectEntry.querySelector('.project-node');
            if (lastNode) {
                 ScrollTrigger.create({
                    trigger: lastProjectEntry,
                    start: "top center",
                    onLeaveBack: () => {
                        if (!lastNode.classList.contains('connecting-signal')) {
                            lastNode.classList.add('connecting-signal');
                            setTimeout(() => {
                                lastNode.classList.remove('connecting-signal');
                            }, 1200);
                        }
                    }
                });
            }
        }

        const headingGlow = document.querySelector('.timeline-header h2');
        if (headingGlow) {
            document.body.addEventListener('mousemove', (e) => {
                const rect = headingGlow.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                headingGlow.style.setProperty('--x', `${x}px`);
                headingGlow.style.setProperty('--y', `${y}px`);
            });
        }
    });
    </script>
</body>
</html>
