<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificates-I</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: radial-gradient(ellipse at center, #0a0a0a 0%, #000000 100%);
            font-family: 'Inter', sans-serif;
            color: #f1f5f9;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .main-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            gap: 3rem;
        }

        /* Professional Section Headings */
        .section-title {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(1.4rem, 4vw, 2.2rem);
            font-weight: 700;
            color: #b0b8c4;
            text-align: center;
            margin-bottom: 1.8rem;
            text-shadow: 0 0 20px rgba(125, 211, 252, 0.3);
            letter-spacing: -0.02em;
            position: relative;
            opacity: 0;
        }

        .section-title .underline {
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, #0ea5e9, #7dd3fc);
            border-radius: 2px;
        }

        /* Certificates Section */
        .certificates-section {
            width: 100%;
            max-width: 900px;
        }

        .certificates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: clamp(1rem, 3vw, 1.5rem);
        }

        .certificate-card {
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.04) 0%,
                rgba(255, 255, 255, 0.015) 50%,
                rgba(255, 255, 255, 0.04) 100%
            );
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(14, 165, 233, 0.2);
            box-shadow: 
                0 8px 20px rgba(0, 0, 0, 0.3),
                0 3px 8px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.25),
                inset 0 -1px 0 rgba(255, 255, 255, 0.1);
            border-radius: clamp(10px, 2vw, 14px);
            padding: clamp(1rem, 3vw, 1.5rem);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: clamp(70px, 12vw, 85px);
            opacity: 0;
        }

        .certificate-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(125, 211, 252, 0.08), transparent);
            transition: left 0.6s ease;
        }

        .certificate-card:hover::before {
            left: 100%;
        }

        .certificate-card:hover {
            transform: translateY(-4px);
            border-color: rgba(125, 211, 252, 0.3);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.5),
                0 8px 20px rgba(0, 0, 0, 0.4),
                0 0 15px rgba(125, 211, 252, 0.15);
        }

        .certificate-name {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(0.85rem, 2.2vw, 1rem);
            font-weight: 600;
            color: #f1f5f9;
            flex-grow: 1;
            margin-right: clamp(0.8rem, 3vw, 1.2rem);
            line-height: 1.4;
        }

        .verify-button {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #f1f5f9;
            border: 1px solid rgba(125, 211, 252, 0.25);
            padding: clamp(0.45rem, 1.8vw, 0.6rem) clamp(0.7rem, 2.5vw, 1.2rem);
            border-radius: clamp(6px, 1.5vw, 8px);
            font-size: clamp(0.7rem, 1.8vw, 0.85rem);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            min-width: clamp(65px, 12vw, 85px);
            font-family: 'Inter', sans-serif;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            white-space: nowrap;
        }

        .verify-button:hover {
            transform: scale(1.05);
            border-color: rgba(125, 211, 252, 0.4);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
        }

        .verify-button.verified {
            background: linear-gradient(135deg, #0ea5e9, #7dd3fc);
            color: white;
            border-color: rgba(125, 211, 252, 0.6);
        }

        /* Contact Section */
        .contact-section {
            width: 100%;
            max-width: 550px;
        }

        .email-container {
            margin-bottom: clamp(1.2rem, 3vw, 2rem);
        }

        .email-field {
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.04) 0%,
                rgba(255, 255, 255, 0.015) 50%,
                rgba(255, 255, 255, 0.04) 100%
            );
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(14, 165, 233, 0.2);
            box-shadow: 
                0 6px 18px rgba(0, 0, 0, 0.25),
                0 2px 8px rgba(0, 0, 0, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.25),
                inset 0 -1px 0 rgba(255, 255, 255, 0.1);
            border-radius: clamp(8px, 2vw, 12px);
            padding: clamp(0.9rem, 2.5vw, 1.1rem) clamp(1rem, 2.5vw, 1.3rem);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: clamp(45px, 8vw, 55px);
            opacity: 0;
        }

        .email-field::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(125, 211, 252, 0.08), transparent);
            transition: left 0.6s ease;
        }

        .email-field:hover::before {
            left: 100%;
        }

        .email-field:hover {
            transform: translateY(-2px);
            border-color: rgba(125, 211, 252, 0.3);
            box-shadow: 
                0 12px 30px rgba(0, 0, 0, 0.4),
                0 4px 15px rgba(0, 0, 0, 0.3),
                0 0 10px rgba(125, 211, 252, 0.1);
        }

        .email-text {
            font-family: 'Inter', sans-serif;
            font-size: clamp(0.8rem, 2.2vw, 0.95rem);
            font-weight: 500;
            color: #f1f5f9;
            flex-grow: 1;
            user-select: all;
            word-break: break-all;
        }

        .copy-button {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #f1f5f9;
            border: 1px solid rgba(125, 211, 252, 0.25);
            padding: clamp(0.35rem, 1.8vw, 0.45rem) clamp(0.7rem, 2.2vw, 0.9rem);
            border-radius: clamp(4px, 1vw, 6px);
            font-size: clamp(0.65rem, 1.8vw, 0.8rem);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            min-width: clamp(45px, 10vw, 65px);
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }

        .copy-button:hover {
            transform: scale(1.05);
            border-color: rgba(125, 211, 252, 0.4);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
        }

        .copy-button.copied {
            background: linear-gradient(135deg, #0ea5e9, #7dd3fc);
            color: white;
            border-color: rgba(125, 211, 252, 0.6);
        }

        /* Social Media Icons */
        .social-section {
            text-align: center;
        }

        .social-logos {
            display: flex;
            justify-content: center;
            gap: clamp(1rem, 4vw, 2rem);
            flex-wrap: wrap;
        }

        .social-logo {
            width: clamp(48px, 10vw, 64px);
            height: clamp(48px, 10vw, 64px);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: clamp(12px, 3vw, 16px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            opacity: 0;
        }

        .social-logo::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(125, 211, 252, 0.1), transparent);
            transition: left 0.6s ease;
        }

        .social-logo:hover::before {
            left: 100%;
        }

        .social-logo:hover {
            transform: translateY(-4px) scale(1.05);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(125, 211, 252, 0.3);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
        }

        .social-icon {
            width: clamp(24px, 5vw, 32px);
            height: clamp(24px, 5vw, 32px);
        }

        /* Enhanced Responsive Design */
        @media (max-width: 1024px) {
            .main-container {
                padding: 2rem 1.5rem;
                gap: 2.5rem;
            }
            
            .certificates-grid {
                grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            }
        }

        /* Fix for 880px to 1030px range - prevents certificate deformation */
        @media (min-width: 880px) and (max-width: 1030px) {
            .certificates-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.5rem;
            }
            
            .certificate-card {
                min-height: 80px;
                padding: 1.2rem 1.5rem;
            }
            
            .certificate-name {
                font-size: 1rem;
                margin-right: 1rem;
            }
            
            .verify-button {
                padding: 0.5rem 1.1rem;
                font-size: 0.8rem;
                min-width: 80px;
            }
        }

        /* Default desktop screen - 2 certificates per row */
        @media (min-width: 1031px) {
            .certificates-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.8rem;
            }
        }

        @media (max-width: 768px) {
            .main-container {
                padding: 1.8rem 1rem;
                gap: 2.5rem;
            }
            
            .certificates-grid {
                grid-template-columns: 1fr;
                gap: 1.3rem;
            }
            
            .certificate-card {
                padding: 1.3rem;
                min-height: 75px;
            }
            
            .certificate-name {
                font-size: 0.95rem;
                margin-right: 0.9rem;
            }
            
            .verify-button {
                padding: 0.5rem 1rem;
                font-size: 0.75rem;
                min-width: 75px;
            }
            
            .email-field {
                min-height: 50px;
                padding: 0.9rem 1rem;
            }
            
            .email-text {
                font-size: 0.9rem;
            }
            
            .copy-button {
                padding: 0.4rem 0.8rem;
                font-size: 0.75rem;
                min-width: 60px;
            }
            
            .social-logos {
                gap: 1.5rem;
            }
            
            .social-logo {
                width: 56px;
                height: 56px;
            }
            
            .social-icon {
                width: 28px;
                height: 28px;
            }
        }

        @media (max-width: 640px) {
            .main-container {
                padding: 1.5rem 0.8rem;
                gap: 2rem;
            }
            
            .section-title {
                margin-bottom: 1.5rem;
            }
            
            .certificates-grid {
                gap: 1.1rem;
            }
            
            .certificate-card {
                padding: 1.1rem;
                min-height: 70px;
            }
            
            .email-container {
                margin-bottom: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .main-container {
                padding: 1rem 0.5rem;
                gap: 1.8rem;
            }
            
            .certificate-card {
                flex-direction: column;
                gap: 0.8rem;
                text-align: center;
                min-height: auto;
                padding: 1.1rem;
            }
            
            .certificate-name {
                margin-right: 0;
                margin-bottom: 0.4rem;
                font-size: 0.9rem;
            }
            
            .verify-button {
                width: 100%;
                max-width: 180px;
            }
            
            .email-field {
                flex-direction: column;
                gap: 0.7rem;
                min-height: auto;
                padding: 0.9rem;
                text-align: center;
            }
            
            .email-text {
                margin-bottom: 0.4rem;
            }
            
            .copy-button {
                width: 100%;
                max-width: 110px;
            }
            
            .social-logos {
                gap: 1rem;
            }
            
            .social-logo {
                width: 48px;
                height: 48px;
            }
            
            .social-icon {
                width: 24px;
                height: 24px;
            }
        }

        @media (max-width: 360px) {
            .main-container {
                padding: 0.8rem 0.3rem;
                gap: 1.3rem;
            }
            
            .section-title {
                font-size: 1.3rem;
                margin-bottom: 1.2rem;
            }
            
            .certificate-card {
                padding: 0.9rem;
            }
            
            .certificate-name {
                font-size: 0.85rem;
            }
            
            .verify-button {
                font-size: 0.7rem;
                padding: 0.45rem 0.9rem;
            }
            
            .email-field {
                padding: 0.7rem;
            }
            
            .email-text {
                font-size: 0.75rem;
            }
            
            .copy-button {
                font-size: 0.65rem;
                padding: 0.35rem 0.7rem;
            }
        }

        /* Landscape orientation adjustments */
        @media (max-height: 500px) and (orientation: landscape) {
            .main-container {
                padding: 1rem;
                gap: 1.5rem;
            }
            
            .section-title {
                font-size: 1.6rem;
                margin-bottom: 1.2rem;
            }
            
            .certificate-card {
                min-height: 60px;
                padding: 0.9rem;
            }
            
            .email-field {
                min-height: 45px;
            }
            
            .social-logo {
                width: 45px;
                height: 45px;
            }
        }

        /* High DPI displays */
        @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
            .section-title {
                text-shadow: 0 0 10px rgba(125, 211, 252, 0.3);
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Certificates Section -->
        <section class="certificates-section">
            <h1 class="section-title">Certificates<span class="underline"></span></h1>
            
            <div class="certificates-grid">
                <div class="certificate-card">
                    <div class="certificate-name">Data Science</div>
                    <a href="https://forage-uploads-prod.s3.amazonaws.com/completion-certificates/tMjbs76F526fF5v3G/NjynCWzGSaWXQCxSX_tMjbs76F526fF5v3G_psAknsoRWTMLN6stA_1751790286503_completion_certificate.pdf" class="verify-button" target="_blank" rel="noopener noreferrer">Verify</a>
                </div>
                
                <div class="certificate-card">
                    <div class="certificate-name">Responsive web Design</div>
                    <a href="https://coursera.org/share/6d31391a7511209f4ea46310f09cd56d" class="verify-button" target="_blank" rel="noopener noreferrer">Verify</a>
                </div>
                
                <div class="certificate-card">
                    <div class="certificate-name">Responsive web Design</div>
                    <a href="https://coursera.org/share/39e89a71982c993b6a55fdedce440b88" class="verify-button" target="_blank" rel="noopener noreferrer">Verify</a>
                </div>
                
                <div class="certificate-card">
                    <div class="certificate-name">Responsive web Design</div>
                    <a href="https://coursera.org/share/18cbb8cf311aeb42c8fa400904906861" class="verify-button" target="_blank" rel="noopener noreferrer">Verify</a>
                </div>
            </div>
        </section>

        <!-- Contact Section -->
        <section class="contact-section">
            <h2 class="section-title">Contact<span class="underline"></span></h2>
            
            <div class="email-container">
                <div class="email-field">
                    <div class="email-text">arafaychaudhry@gmail.com</div>
                    <button class="copy-button" onclick="copyEmail()" id="copyBtn">Copy</button>
                </div>
            </div>
            
            <div class="social-section">
                <div class="social-logos">
                    <div class="social-logo" onclick="openGithub()">
                        <svg class="social-icon" viewBox="0 0 24 24" aria-hidden="true">
                            <path fill="#FFFFFF" d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.387.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.725-4.042-1.416-4.042-1.416-.546-1.387-1.333-1.757-1.333-1.757-1.089-.744.083-.729.083-.729 1.205.086 1.84 1.236 1.84 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.775.417-1.305.76-1.605-2.665-.305-5.466-1.332-5.466-5.93 0-1.31.468-2.381 1.236-3.22-.123-.304-.536-1.527.117-3.176 0 0 1.008-.322 3.301 1.23a11.52 11.52 0 0 1 6.003 0c2.292-1.553 3.298-1.23 3.298-1.23.654 1.649.242 2.872.118 3.176.77.839 1.235 1.909 1.235 3.22 0 4.61-2.804 5.624-5.475 5.922.43.372.813 1.104.813 2.222 0 1.606-.015 2.9-.015 3.292 0 .319.216.694.825.576C20.565 22.092 24 17.593 24 12.297c0-6.627-5.373-12-12-12"/>
                        </svg>
                    </div>
                    
                    <div class="social-logo" onclick="openLinkedIn()">
                        <svg class="social-icon" viewBox="0 0 24 24" aria-hidden="true">
                            <path fill="#0A66C2" d="M22.23 0H1.77C.792 0 0 .774 0 1.729v20.542C0 23.226.792 24 1.77 24h20.46C23.208 24 24 23.226 24 22.27V1.729C24 .774 23.208 0 22.23 0zM7.12 20.452H3.558V9h3.562v11.452zM5.339 7.433a2.062 2.062 0 1 1-.001-4.125 2.062 2.062 0 0 1 .001 4.125zM20.451 20.452h-3.562v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.339V9h3.413v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286z"/>
                        </svg>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        // Copy email function
        function copyEmail() {
            const email = 'arafaychaudhry@gmail.com';
            const button = document.getElementById('copyBtn');
            
            navigator.clipboard.writeText(email).then(() => {
                button.textContent = 'Copied!';
                button.classList.add('copied');
                
                setTimeout(() => {
                    button.textContent = 'Copy';
                    button.classList.remove('copied');
                }, 2000);
            }).catch(() => {
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = email;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                
                button.textContent = 'Copied!';
                button.classList.add('copied');
                
                setTimeout(() => {
                    button.textContent = 'Copy';
                    button.classList.remove('copied');
                }, 2000);
            });
        }

        // Updated social media functions
        function openGithub() {
            window.open('https://github.com/CH-RAFAY', '_blank');
        }

        function openLinkedIn() {
            window.open('https://www.linkedin.com/in/rafay-chaudhry-54b671301', '_blank');
        }

        // GSAP Animations
        gsap.registerPlugin(ScrollTrigger);

        // Animate elements on load with smoother transitions
        const tl = gsap.timeline();

        tl.fromTo('.section-title', 
            { opacity: 0, y: 20 },
            { opacity: 1, y: 0, duration: 1, stagger: 0.15, ease: "power2.out" }
        )
        .fromTo('.section-title .underline',
            { width: 0 },
            { width: 'clamp(40px, 8vw, 60px)', duration: 1, stagger: 0.15, ease: "power2.out" },
            "<"
        )
        .fromTo('.certificate-card', 
            { opacity: 0, y: 25, scale: 0.98 },
            { opacity: 1, y: 0, scale: 1, duration: 0.8, stagger: 0.08, ease: "power2.out" }, 
            "-=0.4"
        )
        .fromTo('.email-field', 
            { opacity: 0, y: 20, scale: 0.98 },
            { opacity: 1, y: 0, scale: 1, duration: 0.8, ease: "power2.out" }, 
            "-=0.3"
        )
        .fromTo('.social-logo', 
            { opacity: 0, y: 20, scale: 0.9 },
            { opacity: 1, y: 0, scale: 1, duration: 0.8, stagger: 0.08, ease: "back.out(1.2)" }, 
            "-=0.3"
        );

        // Add click animations
        document.getElementById('copyBtn').addEventListener('click', function() {
            gsap.to(this, {
                scale: 0.95,
                duration: 0.1,
                yoyo: true,
                repeat: 1,
                ease: "power2.inOut"
            });
        });

        document.querySelectorAll('.social-logo').forEach(logo => {
            logo.addEventListener('click', function() {
                gsap.to(this, {
                    scale: 0.9,
                    duration: 0.1,
                    yoyo: true,
                    repeat: 1,
                    ease: "power2.inOut"
                });
            });
        });
    </script>
</body>
</html>
